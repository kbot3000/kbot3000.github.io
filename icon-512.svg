<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1a4fd0"/>
    </linearGradient>
    <linearGradient id="mtnGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.88"/>
    </linearGradient>
    <clipPath id="iconClip">
      <rect width="512" height="512" rx="110"/>
    </clipPath>
  </defs>

  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="110" fill="url(#bgGrad)"/>

  <!-- ── Mountain silhouette (two Alpine peaks) ── -->
  <!-- Main shape: left base → left peak → valley → right peak → right base -->
  <path d="M 48 318
           L 204 102
           L 274 196
           L 352 138
           L 468 318
           Z"
        fill="url(#mtnGrad)"/>

  <!-- Snow cap — left peak -->
  <path d="M 204 102  L 168 158  L 242 158  Z"
        fill="white" fill-opacity="0.25"/>

  <!-- Snow cap — right peak -->
  <path d="M 352 138  L 320 180  L 384 180  Z"
        fill="white" fill-opacity="0.25"/>

  <!-- ── Invoice lines (3 descending-width bars) ── -->
  <rect x="124" y="350" width="264" height="22" rx="11" fill="white" fill-opacity="0.92"/>
  <rect x="124" y="390" width="210" height="22" rx="11" fill="white" fill-opacity="0.92"/>
  <rect x="124" y="430" width="152" height="22" rx="11" fill="white" fill-opacity="0.92"/>
</svg>